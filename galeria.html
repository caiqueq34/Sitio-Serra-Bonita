<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria - Sítio Serra Bonita</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        :root {
            --verde-folha: #7CB342;
            --verde-escuro: #558B2F;
            --marrom-claro: #8D6E63;
            --marrom-escuro: #3E2723;
            --creme-fundo: #F5F5DC;
            --branco: #FFFFFF;
        }
        body { font-family: 'Nunito', sans-serif; background-color: var(--creme-fundo); color: var(--marrom-escuro); line-height: 1.7; overflow-x: hidden; }

        header {
            background-color: rgba(62, 39, 35, 0.95);
            padding: 0.8rem 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 10px rgba(62, 39, 35, 0.3);
            border-bottom: 4px solid var(--verde-folha);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

   .logo-header {
            position: absolute;
            left: 2rem;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }
   .logo-link { display: inline-block; transition: transform 0.3s ease; }
   .logo-link:hover { transform: scale(1.05); }
   .logo-img { height: 70px; width: auto; display: block; }

        nav {
            display: flex;
            gap: 2.5rem;
            align-items: center;
            justify-content: center;
        }
        nav a {
            color: var(--creme-fundo);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s;
            padding: 0.5rem 0;
            border-bottom: 3px solid transparent;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        nav a:hover, nav a.active { color: var(--verde-folha); border-bottom: 3px solid var(--verde-folha); }

   .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 22px;
            background: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1001;
            position: absolute;
            right: 2rem;
        }
   .menu-toggle span {
            display: block;
            height: 3px;
            width: 100%;
            background-color: var(--creme-fundo);
            border-radius: 3px;
            transition: all 0.3s ease;
        }
   .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(8px, 8px);
        }
   .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }
   .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

   .container { max-width: 1100px; margin: 7rem auto 3rem auto; padding: 0 2rem; text-align: center; }
        h2 { font-family: 'Merriweather', serif; font-size: 2.8rem; color: var(--marrom-escuro); margin-bottom: 1rem; font-weight: 900; }
        p { font-size: 1.1rem; color: var(--marrom-claro); margin-bottom: 2.5rem; }

   .carrossel-bloco { margin-bottom: 4rem; }
   .carrossel-bloco p { margin-bottom: 1.5rem; }

   .carrossel { position: relative; max-width: 900px; margin: 0 auto; border-radius: 16px; overflow: hidden; box-shadow: 0 6px 20px rgba(62, 39, 35, 0.3); border: 4px solid var(--verde-folha); }
   .carrossel-container { position: relative; width: 100%; height: 550px; }
   .slide { display: none; width: 100%; height: 100%; position: relative; }
   .slide.active { display: block; }
   .slide img { width: 100%; height: 100%; object-fit: cover; }
   .slide-legenda { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(62, 39, 35, 0.9)); color: var(--branco); padding: 2rem 1.5rem 1.5rem 1.5rem; font-size: 1.2rem; font-weight: 600; }
   .carrossel-btn { position: absolute; top: 50%; transform: translateY(-50%); background-color: rgba(124, 179, 66, 0.8); color: var(--branco); border: none; font-size: 2rem; padding: 1rem 1.3rem; cursor: pointer; border-radius: 50%; transition: all 0.3s; z-index: 10; }
   .carrossel-btn:hover { background-color: var(--verde-folha); transform: translateY(-50%) scale(1.1); }
   .prev { left: 15px; }
   .next { right: 15px; }
   .indicadores { text-align: center; margin-top: 1.5rem; }
   .dot { height: 12px; width: 12px; margin: 0 5px; background-color: var(--marrom-claro); border-radius: 50%; display: inline-block; cursor: pointer; transition: all 0.3s; }
   .dot.active,.dot:hover { background-color: var(--verde-folha); transform: scale(1.3); }

   .btn-topo {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 55px;
            height: 55px;
            background-color: var(--verde-folha);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(124, 179, 66, 0.5);
            transition: all 0.3s;
            z-index: 999;
            opacity: 0;
            visibility: hidden;
        }
   .btn-topo.mostrar {
            opacity: 1;
            visibility: visible;
        }
   .btn-topo:hover {
            background-color: var(--verde-escuro);
            transform: translateY(-5px);
            box-shadow: 0 6px 20px rgba(124, 179, 66, 0.7);
        }
   .btn-topo svg {
            width: 24px;
            height: 24px;
            fill: var(--branco);
        }

        footer { background-color: var(--marrom-escuro); color: var(--creme-fundo); text-align: center; padding: 1.5rem; margin-top: 4rem; }
        footer p { margin: 0 auto; color: var(--creme-fundo); font-weight: 600; max-width: 1100px; }

        @media (max-width: 768px) {
            header { justify-content: space-between; padding: 0.8rem 1.5rem; }
       .logo-header { position: static; }
       .logo-img { height: 60px; }
       .menu-toggle { display: flex; position: static; }
            nav {
                position: fixed;
                top: 86px;
                left: -100%;
                width: 100%;
                height: calc(100vh - 86px);
                background-color: rgba(62, 39, 35, 0.98);
                flex-direction: column;
                gap: 0;
                padding: 2rem 0;
                margin: 0;
                transition: left 0.4s ease;
                backdrop-filter: blur(10px);
            }
            nav.active { left: 0; }
            nav a {
                font-size: 1.3rem;
                padding: 1.2rem 2rem;
                width: 100%;
                text-align: center;
                border-bottom: 1px solid rgba(124, 179, 66, 0.2);
            }
            nav a:hover, nav a.active {
                background-color: rgba(124, 179, 66, 0.1);
                border-bottom: 1px solid rgba(124, 179, 66, 0.2);
            }
       .container { padding: 0 1rem; margin-top: 6rem; }
            h2 { font-size: 2rem; }
       .carrossel-container { height: 350px; }
       .carrossel-btn { font-size: 1.5rem; padding: 0.8rem 1rem; }
       .btn-topo { width: 50px; height: 50px; bottom: 20px; right: 20px; }
       .btn-topo svg { width: 22px; height: 22px; }
        }
    </style>
</head>

    <script>
        // Inicializa cada carrossel independentemente e gera os dots
        document.querySelectorAll('.carrossel-bloco').forEach(bloco => {
            const slides = bloco.querySelectorAll('.slide');
            const indicadores = bloco.querySelector('.indicadores');
            const prevBtn = bloco.querySelector('.prev');
            const nextBtn = bloco.querySelector('.next');
            let slideIndex = 0;
            let intervalo;

            // Gera os dots baseado na quantidade de slides
            indicadores.innerHTML = '';
            slides.forEach((_, index) => {
                const dot = document.createElement('span');
                dot.classList.add('dot');
                if (index === 0) dot.classList.add('active');
                dot.addEventListener('click', () => irParaSlide(index));
                indicadores.appendChild(dot);
            });

            const dots = indicadores.querySelectorAll('.dot');

            function mostrarSlide(n) {
                if (n >= slides.length) slideIndex = 0;
                if (n < 0) slideIndex = slides.length - 1;
                slides.forEach(slide => slide.classList.remove('active'));
                dots.forEach(dot => dot.classList.remove('active'));
                slides[slideIndex].classList.add('active');
                dots[slideIndex].classList.add('active');
            }

            function mudarSlide(n) {
                slideIndex += n;
                mostrarSlide(slideIndex);
                resetarIntervalo();
            }

            function irParaSlide(n) {
                slideIndex = n;
                mostrarSlide(slideIndex);
                resetarIntervalo();
            }

            function resetarIntervalo() {
                clearInterval(intervalo);
                intervalo = setInterval(() => {
                    slideIndex++;
                    mostrarSlide(slideIndex);
                }, 5000);
            }

            prevBtn.addEventListener('click', () => mudarSlide(-1));
            nextBtn.addEventListener('click', () => mudarSlide(1));

            // Inicia autoplay
            resetarIntervalo();
        });

        // Menu Sanduíche
        const menuToggle = document.getElementById('menuToggle');
        const navMenu = document.getElementById('navMenu');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // Fecha o menu ao clicar em um link
        document.querySelectorAll('nav a').forEach(link => {
            link.addEventListener('click', () => {
                menuToggle.classList.remove('active');
                navMenu.classList.remove('active');
            });
        });

        // Botão voltar ao topo aparece quando rola a página
        const btnTopo = document.querySelector('.btn-topo');

        window.addEventListener('scroll', () => {
            if (window.pageYOffset > 300) {
                btnTopo.classList.add('mostrar');
            } else {
                btnTopo.classList.remove('mostrar');
            }
        });
    </script>
